name: Daily AI Research

on:
  schedule:
    - cron: '0 9 * * *' # Run at 9am daily
  workflow_dispatch:

# Lock all workflows in the repo to ONE run at a time to prevent push conflicts
concurrency:
  group: github-activity-maintenance
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v3
        with:
          node-version: '16'

      - run: node index.js

      - name: Commit changes
        run: |
          git config --global user.name 'ArXiv Bot'
          git config --global user.email 'bot@noreply.github.com'
          git add README.md PAPERS.md
          git diff --cached --quiet && exit 0
          git commit -m "bot: Update Daily Research @om051105"
          git pull --rebase origin main
          git push origin main