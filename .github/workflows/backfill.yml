name: Historical Graph Backfill

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start Date (YYYY-MM-DD)'
        required: true
        default: '2025-01-01'
      end_date:
        description: 'End Date (YYYY-MM-DD)'
        required: true
        default: '2025-12-31'
      density:
        description: 'Density (0.1 to 1.0 - how full to make the graph)'
        required: true
        default: '0.3'

# Lock all workflows in the repo to ONE run at a time to prevent push conflicts
concurrency:
  group: github-activity-maintenance
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout daily-quote-bot
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Backfill
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_USERNAME: om051105
        run: |
          export START_DATE="${{ github.event.inputs.start_date }}"
          export END_DATE="${{ github.event.inputs.end_date }}"
          export FILL_DENSITY="${{ github.event.inputs.density }}"
          node backfill.js
